# Build and push theo-packs-runner container image to DigitalOcean Container Registry.
#
# Trigger:
#   push to main     → test + build + push with :latest, :sha and :YYYYMMDD tags
#   workflow_dispatch → manual build
#
# The image is used by the Theo build pipeline's generate-dockerfile step
# in Argo Workflows. It replaces hardcoded bash Dockerfile generation.
#
# Required secrets (GitHub Environment: infra-dev):
#   DIGITALOCEAN_TOKEN — DO API token for registry login + push
#
# Security: Actions are pinned to commit SHAs instead of tags/versions.
# Tags are mutable and can be force-pushed, allowing attackers to replace trusted
# code with malicious code. SHAs are immutable and protect against supply chain attacks.

name: "Build: theo-packs-runner"

on:
  push:
    branches: [main]
    paths:
      - "core/**"
      - "cmd/**"
      - "Dockerfile.generate"
      - "go.mod"
      - "go.sum"

  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: registry.digitalocean.com/theo-system
  IMAGE_NAME: theo-packs-runner

jobs:
  test:
    name: Test before build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2.4.4

      - name: Cache Go modules and build artifacts
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-${{ runner.os }}-

      - name: Lint and vet
        run: mise run check

      - name: Test
        run: mise run test

  build:
    name: Build and push
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: infra-dev
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install doctl
        uses: digitalocean/action-doctl@135ac0aa0eed4437d547c6f12c364d3006b42824 # v2.5.1
        with:
          token: ${{ secrets.DIGITALOCEAN_TOKEN }}

      - name: Login to DO Container Registry
        run: doctl registry login --expiry-seconds 600

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Generate date tag
        id: date
        run: echo "tag=$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Build image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: Dockerfile.generate
          load: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.date.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} --help

      - name: Scan for vulnerabilities
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH

      - name: Push image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.date.outputs.tag }}

      - name: Summary
        run: |
          echo "### theo-packs-runner" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- SHA: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Date: \`${{ steps.date.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Para rollback, use a tag com data ou SHA em vez de \`:latest\`." >> "$GITHUB_STEP_SUMMARY"
