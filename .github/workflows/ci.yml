# CI pipeline for theo-packs: lint, vet, and test the core library and binary.
#
# Runs on every push and pull request.

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint + Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Vet
        run: go vet ./...

      - name: Test core
        run: go test ./core/...

      - name: Test binary
        run: go test ./cmd/...
