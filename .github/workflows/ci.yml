# CI pipeline for theo-packs: lint, vet, and test the core library and binary.
#
# Runs on every push to main and pull request.
#
# Security: Actions are pinned to commit SHAs instead of tags/versions.
# Tags are mutable and can be force-pushed, allowing attackers to replace trusted
# code with malicious code. SHAs are immutable and protect against supply chain attacks.

name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "LICENSE"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "LICENSE"

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint + Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2.4.4

      - name: Cache Go modules and build artifacts
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-${{ runner.os }}-

      - name: Lint and vet
        run: mise run check

      - name: Test
        run: mise run test
